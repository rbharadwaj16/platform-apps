apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: azure-storage-account-ai
  title: Azure Storage Account AI Assisted
  description: Provision an Azure Storage Account via Crossplane using natural language
  tags:
    - azure
    - storage
    - crossplane
    - ai
spec:
  owner: platform-team
  type: infrastructure

  parameters:
    - title: Storage Account Request
      required:
        - requestText
      properties:
        requestText:
          title: Describe what you want
          type: string
          description: Example - create a storage account named backstgtstraghav in eastus in resource group myapp-rg with standard_lrs
          ui:autofocus: true

  steps:
    - id: translatorRun
      name: Translate natural language request
      action: ace:translator:run
      input:
        requestText: ${{ parameters.requestText }}
        expectedResourceType: storage_account

    - id: generateXr
      name: Generate Crossplane XR Manifest
      action: fetch:template
      input:
        url: ./skeleton
        values:
          storageAccountName: ${{ steps.translatorRun.output.parameters.storageAccountName }}
          resourceGroupName: ${{ steps.translatorRun.output.parameters.resourceGroupName }}
          location: ${{ steps.translatorRun.output.parameters.location }}
          sku: ${{ steps.translatorRun.output.parameters.sku }}

    - id: publish
      name: Raise PR to Platform Repo
      action: publish:github:pull-request
      input:
        repoUrl: github.com?repo=platform-infra&owner=rbharadwaj16
        title: "feat: provision storage account ${{ steps.translatorRun.output.parameters.storageAccountName }}"
        branchName: "storage-${{ steps.translatorRun.output.parameters.storageAccountName }}"
        description: |
          ## New Azure Storage Account Request

          | Field | Value |
          |-------|-------|
          | Name | ${{ steps.translatorRun.output.parameters.storageAccountName }} |
          | Resource Group | ${{ steps.translatorRun.output.parameters.resourceGroupName }} |
          | Location | ${{ steps.translatorRun.output.parameters.location }} |
          | SKU | ${{ steps.translatorRun.output.parameters.sku }} |
        targetPath: platform-core/crossplane/xrs/dev/${{ steps.translatorRun.output.parameters.storageAccountName }}

  output:
    links:
      - title: Pull Request
        url: ${{ steps.publish.output.remoteUrl }}
        icon: github
