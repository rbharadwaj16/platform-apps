apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: azure-storage-account
  title: Azure Storage Account
  description: Provision an Azure Storage Account via Crossplane
  tags:
    - azure
    - storage
    - crossplane
spec:
  owner: platform-team
  type: infrastructure

  parameters:
    - title: Storage Account Request
      required:
        - requestText
      properties:
        requestText:
          title: Describe what you want
          type: string
          description: Example - create a storage account named backstgtstraghav in eastus in resource group myapp-rg with standard_lrs
          ui:autofocus: true

  steps:
    - id: translatorRun
      name: Translate natural language request
      action: ace:translator:run
      input:
        requestText: ${{ parameters.requestText }}

    - id: generateXr
      name: Generate Crossplane XR Manifest
      action: fetch:template
      input:
        url: ./skeleton
        values:
          storageAccountName: ${{ steps.translatorRun.output.parameters.storageAccountName }}
          resourceGroupName: ${{ steps.translatorRun.output.parameters.resourceGroupName }}
          location: ${{ steps.translatorRun.output.parameters.location }}
          sku: ${{ steps.translatorRun.output.parameters.sku }}

    - id: showResult
      name: Show generated values
      action: debug:log
      input:
        message: |
          Translator output:
          ${{ steps.translatorRun.output | dump }}

  output:
    links: []